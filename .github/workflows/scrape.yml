name: Scrape quotidien

on:
  schedule:
    # 06:30 UTC = ~07:30/08:30 en France selon l'heure d'été/hiver
    - cron: "30 6 * * *"
  workflow_dispatch: {} # déclenchement manuel depuis l'onglet Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le pipeline (scrape + score + notif)
        env:
          KEYWORDS: ${{ vars.KEYWORDS }}
          LOCATION: ${{ vars.LOCATION }}
          SCORING_ENABLED: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py
