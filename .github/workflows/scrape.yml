name: Scrape quotidien

on:
  schedule:
    # Le quota gratuit Gemini se réinitialise à minuit heure du Pacifique
    # (= 07:00 UTC l'été). On lance APRÈS ce reset pour disposer du quota plein.
    # Deux passages par jour pour drainer le backlog de tagging sur la journée.
    - cron: "0 8 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {} # déclenchement manuel depuis l'onglet Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le pipeline (scrape + score + notif)
        env:
          KEYWORDS: ${{ vars.KEYWORDS }}
          LOCATION: ${{ vars.LOCATION }}
          SCORING_ENABLED: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py
